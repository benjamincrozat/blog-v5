interface:
  display_name: "SEO Content"
  short_description: "Optimize posts for Google and live SERPs"
  default_prompt: "Use $seo-content alongside $post-writing for new or existing publication-ready blog posts, ground decisions in current Google Search guidance and live Google SERP checks, use the browser MCP when real Google rankings or SERP features matter, analyze the top 3 organic competitors for supplied keywords to find framing and content gaps, verify article facts with official or primary sources instead of competitors, keep visible titles/descriptions and any `serp_*` overrides on the same promise, leave `serp_title` and `serp_description` null unless a tighter but equivalent search/browser override is justified, treat title and description length as soft CTR heuristics rather than hard Google limits, front-load the query match and benefit, compare existing posts against the current SERP before major changes, align title/description/slug with search intent, refresh relevant internal links, keep the related-posts Markdown list current only on non-commercial posts, never add or keep read-next recommendations on `is_commercial: true` posts because those pages should stay focused on conversion, make the non-commercial lead-in sentence unique to each article instead of reusing a stock phrase or canned curiosity hook, keep that sentence natural instead of quoting or lightly rephrasing the title back to the reader, rewrite non-commercial anchor text contextually instead of pasting destination titles, make each non-commercial anchor sound like the next sensible click for this reader rather than a catalog label, keep those anchors clear enough that the reason to click is obvious immediately, choose recommendations with editorial judgment because they feel like real next reads rather than mechanical category matches, include only as many genuinely useful recommendations as the topic supports up to 10, and keep the recommendations durable rather than spammy."
