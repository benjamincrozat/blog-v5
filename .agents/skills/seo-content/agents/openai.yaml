interface:
  display_name: "SEO Content"
  short_description: "Optimize posts for Search, Discover, and News"
  default_prompt: "Use $seo-content alongside $post-writing for new or existing publication-ready blog posts, ground decisions in current Google Search guidance and live Google SERP checks, and decide explicitly whether the page should mainly target Search, Discover, Google News, or an honest overlap. Use the browser MCP when real Google rankings or SERP features matter, analyze the top 3 organic competitors for supplied keywords to find framing and content gaps, verify article facts with official or primary sources instead of competitors, keep visible titles/descriptions and any `serp_*` overrides on the same promise, leave `serp_title` and `serp_description` null unless a tighter but equivalent search/browser override is justified, treat title and description length as soft CTR heuristics rather than hard Google limits, front-load the query match and benefit, and compare existing posts against the current SERP before major changes. If `categories` includes `news`, judge whether the piece is genuinely newsworthy, keep the headline clear without clickbait, require visible byline and publish/update information, and verify claims with primary sources attributed inline. Do not assume every news post is a Discover candidate or every Discover candidate is news. Decide whether the SERP or the angle shows meaningful visual intent, assume original screenshots or other first-hand visuals are part of the plan for UI-heavy, workflow, review, or comparison topics unless the SERP shows they add no value, treat visuals as indirect support for clarity, authenticity, image visibility, and AI cite-worthiness rather than a standalone ranking factor, and for posts aiming strongly at Discover or Google News make the main image original when feasible, not a logo, and at least 1200 px wide. Refresh relevant internal links, keep the related-posts Markdown list current only on non-commercial posts, never add or keep read-next recommendations on `is_commercial: true` posts because those pages should stay focused on conversion, make the non-commercial lead-in sentence unique to each article instead of reusing a stock phrase or canned curiosity hook, keep that sentence natural instead of quoting or lightly rephrasing the title back to the reader, rewrite non-commercial anchor text contextually instead of pasting destination titles, make each non-commercial anchor sound like the next sensible click for this reader rather than a catalog label, keep those anchors clear enough that the reason to click is obvious immediately, choose recommendations with editorial judgment because they feel like real next reads rather than mechanical category matches, include only as many genuinely useful recommendations as the topic supports up to 10, and keep the recommendations durable rather than spammy."
