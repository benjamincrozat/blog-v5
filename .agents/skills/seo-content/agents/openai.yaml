interface:
  display_name: "SEO Content"
  short_description: "Optimize posts for Google and live SERPs"
  default_prompt: "Use $seo-content alongside $post-writing for new or existing publication-ready blog posts, ground decisions in current Google Search guidance and live Google SERP checks, use the browser MCP when real Google rankings or SERP features matter, analyze the top 3 organic competitors for supplied keywords to find framing and content gaps, verify article facts with official or primary sources instead of competitors, compare existing posts against the current SERP before major changes, align title/description/slug with search intent, and keep the recommendations durable rather than spammy."
