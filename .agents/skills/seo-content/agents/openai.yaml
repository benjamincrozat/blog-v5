interface:
  display_name: "SEO Content"
  short_description: "Optimize posts for Google and live SERPs"
  default_prompt: "Use $seo-content alongside $post-writing for new or existing publication-ready blog posts, ground decisions in current Google Search guidance and live Google SERP checks, use the browser MCP when real Google rankings or SERP features matter, analyze the top 3 organic competitors for supplied keywords to find framing and content gaps, verify article facts with official or primary sources instead of competitors, keep visible titles/descriptions and any `serp_*` overrides on the same promise, leave `serp_title` and `serp_description` null unless a tighter but equivalent search/browser override is justified, treat title and description length as soft CTR heuristics rather than hard Google limits, front-load the query match and benefit, compare existing posts against the current SERP before major changes, align title/description/slug with search intent, refresh relevant internal links and the related-posts Markdown list, make the lead-in sentence unique to each article instead of reusing a stock phrase or canned curiosity hook, keep that sentence natural instead of quoting or lightly rephrasing the title back to the reader, include only as many genuinely useful recommendations as the topic supports up to 10, and keep the recommendations durable rather than spammy."
