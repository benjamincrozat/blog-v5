interface:
  display_name: "File-first Posts"
  short_description: "Run the Markdown workflow for evergreen and timely posts"
  default_prompt: "Use $file-first-posts when the task is about exporting posts from the local database, editing Markdown-managed posts, publishing via `published_at`, syncing files back into the database, and keeping Filament read-only for posts. When article copy changes, pair with $post-writing, keep internal links current, refresh the related-posts Markdown list only on non-commercial posts, never add or keep read-next recommendations on `is_commercial: true` posts because those pages should stay focused on conversion, make non-commercial related-reading lead-ins natural and article-specific instead of a stock phrase or title echo, rewrite non-commercial anchor text contextually instead of pasting post titles, make each non-commercial anchor feel like the next useful click for this reader instead of a copied label, and choose recommendations as smart next reads instead of mechanical category matches. Create original screenshots when the article explains an interface, workflow, terminal result, or before/after state and the visual would materially help, skip screenshots when they add no proof or clarity, and for posts aiming strongly at Discover or Google News make the main image original when feasible, not a logo, and at least 1200 px wide. If `categories` includes `news`, publish promptly, run `php artisan app:sync-posts` right after meaningful edits, use `modified_at` only for substantive reporting updates, and only treat first-party, non-commercial, non-sponsored news posts as news-sitemap candidates. Skip browser checks unless the post has tricky rendering, needs purposeful screenshots, or the user asks for a visual pass."
