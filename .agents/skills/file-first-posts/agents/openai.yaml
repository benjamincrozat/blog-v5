interface:
  display_name: "File-first Posts"
  short_description: "Run the Markdown-based post workflow"
  default_prompt: "Use $file-first-posts when the task is about exporting posts from the local database, editing Markdown-managed posts, publishing via published_at, syncing files back into the database, and keeping Filament read-only for posts; when article copy changes, pair with $post-writing and keep internal links plus the related-posts Markdown list current before syncing, make that related-reading lead-in natural and article-specific instead of a stock phrase or title echo, rewrite the anchor text contextually instead of pasting post titles, make each anchor feel like the next useful click for this reader instead of a copied label, choose recommendations as smart next reads instead of mechanical category matches, and skip browser checks unless the post has tricky rendering or the user asks for a visual pass."
