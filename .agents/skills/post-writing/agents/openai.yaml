interface:
  display_name: "Post Writing"
  short_description: "Draft concise, source-backed blog posts"
  default_prompt: "Use $post-writing to draft or revise publication-ready posts in resources/markdown/posts, keep the writing reader-first and concise, preserve valid frontmatter and stable post IDs, align title/description/slug around one clear promise, leave `serp_title` and `serp_description` null unless a tighter but equivalent search/browser override is clearly better, write titles and descriptions to earn the click through specificity and concrete value instead of gimmicks, prefer practical examples and inline primary-source links, always add or refresh natural internal links plus a curiosity-led related-posts Markdown list using `- [anchor](link)` bullets, skip browser-based validation unless rendering is tricky or the user asks for it, and pair with $seo-content for search intent and SERP work."
