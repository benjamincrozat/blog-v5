interface:
  display_name: "Post Writing"
  short_description: "Draft concise, source-backed blog posts"
  default_prompt: "Use $post-writing to draft or revise publication-ready posts in resources/markdown/posts, keep the writing reader-first and concise, preserve valid frontmatter and stable post IDs, align title/description/slug around one clear promise, leave `serp_title` and `serp_description` null unless a tighter but equivalent search/browser override is clearly better, write titles and descriptions to earn the click through specificity and concrete value instead of gimmicks, prefer practical examples and inline primary-source links, actively look for places where original screenshots or simple visuals would make a walkthrough, comparison, review, or UI-heavy article clearer or more credible, create those visuals yourself when feasible instead of leaving a TODO, skip visuals when they would just be filler, always add or refresh natural internal links, add or refresh a related-posts Markdown list using `- [anchor](link)` bullets only on non-commercial posts, never add or keep read-next recommendations on `is_commercial: true` posts because those pages should stay focused on conversion, give the non-commercial list a lead-in sentence written specifically for the article instead of a stock phrase or canned curiosity hook, make that sentence a smooth natural transition instead of quoting or paraphrasing the title back to the reader, rewrite non-commercial anchor text contextually instead of copying the destination title verbatim, write each non-commercial anchor like the next question or payoff this reader would naturally care about, favor clarity over cleverness so the reason to click is obvious right away, choose recommendations with editorial judgment because they feel like real next reads rather than category matches, include only as many useful recommendations as are really available up to 10, skip browser-based validation unless rendering is tricky, a first-hand screenshot is materially helpful, or the user asks for it, and pair with $seo-content for search intent and SERP work."
